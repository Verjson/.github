name: node-ci (reusable)

# Reusable CI for the verJSON Node libraries: checkout, setup-node against the
# @verjson GitHub Packages registry, then npm ci / build / test / lint. The
# runner is defined here once (defaults to the GCP self-hosted pool), so moving
# the fleet later is a one-file change instead of a per-repo edit.
#
# Caller (each lib's .github/workflows/ci.yml):
#
#   name: CI
#   on:
#     pull_request:
#   jobs:
#     ci:
#       permissions:              # REQUIRED for @scope/* from GitHub Packages:
#         contents: read          # a reusable's GITHUB_TOKEN is capped by the
#         packages: read          # caller, so packages:read must be granted here
#                                 # or `npm ci` 401s on private @scope deps.
#       uses: Verjson/.github/.github/workflows/node-ci.yml@main
#       secrets: inherit          # passes NODE_AUTH_TOKEN (+ submodules-token)
#       # with:
#       #   node-version: '22.23.1'   # override when a repo pins a version
#       #   scope: ''                 # set empty to skip the private registry
#       #   schema-dir: myapp-schema  # npm ci a `file:` schema submodule first
#       #                             # (needs submodules-token for a private one)

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version for actions/setup-node
        required: false
        type: string
        default: '24'
      scope:
        description: npm scope for the GitHub Packages registry (empty to skip registry auth)
        required: false
        type: string
        default: '@verjson'
      schema-dir:
        description: >-
          Path to a schema submodule to `npm ci` before the root install (a Node
          repo consuming its @verjson schema package as a `file:` submodule dep).
          Empty string skips it.
        required: false
        type: string
        default: ''
      runner:
        description: JSON array of runner labels; defaults to the GCP self-hosted pool
        required: false
        type: string
        default: '["self-hosted", "GCP"]'
    secrets:
      NODE_AUTH_TOKEN:
        description: Token to read @verjson private packages from GitHub Packages
        required: false
      submodules-token:
        description: >-
          Token to check out private sibling submodules (e.g. the schema repo).
          Falls back to GITHUB_TOKEN when empty — which only reads the current
          repo, so a private sibling submodule requires this token to be set.
        required: false

jobs:
  build-test:
    runs-on: ${{ fromJSON(inputs.runner) }}
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: recursive
          token: ${{ secrets.submodules-token || github.token }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: https://npm.pkg.github.com
          scope: ${{ inputs.scope }}
      - name: Install schema submodule deps
        if: inputs.schema-dir != ''
        working-directory: ${{ inputs.schema-dir }}
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
      - run: npm run build
      - run: npm test
      - run: npm run lint --if-present
