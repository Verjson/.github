name: node-ci (reusable)

# Reusable CI for the verJSON Node libraries: checkout, setup-node against the
# @verjson GitHub Packages registry, then npm ci / build / test / lint. The
# runner is defined here once (defaults to the GCP self-hosted pool), so moving
# the fleet later is a one-file change instead of a per-repo edit.
#
# Caller (each lib's .github/workflows/ci.yml):
#
#   name: CI
#   on:
#     pull_request:
#   jobs:
#     ci:
#       permissions:              # REQUIRED for @scope/* from GitHub Packages:
#         contents: read          # a reusable's GITHUB_TOKEN is capped by the
#         packages: read          # caller, so packages:read must be granted here
#                                 # or `npm ci` 401s on private @scope deps.
#         statuses: read          # lets the eligibility job read the head's
#                                 # renovate/stability-days status to defer CI on
#                                 # held Renovate PRs (#133, ADR 0023). The token
#                                 # is capped by the caller, so this must be
#                                 # granted here; if omitted the check fails OPEN
#                                 # and CI runs as before (safe degradation).
#       uses: Verjson/.github/.github/workflows/node-ci.yml@main
#       secrets: inherit          # passes NODE_AUTH_TOKEN (+ submodules-token)
#       # with:
#       #   node-version: '22.23.1'   # override when a repo pins a version
#       #   scope: ''                 # set empty to skip the private registry
#       #   schema-dir: myapp-schema  # npm ci a `file:` schema submodule first
#       #                             # (needs submodules-token for a private one)

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version for actions/setup-node
        required: false
        type: string
        default: '24'
      scope:
        description: npm scope for the GitHub Packages registry (empty to skip registry auth)
        required: false
        type: string
        default: '@verjson'
      schema-dir:
        description: >-
          Path to a schema submodule to `npm ci` before the root install (a Node
          repo consuming its @verjson schema package as a `file:` submodule dep).
          Empty string skips it.
        required: false
        type: string
        default: ''
      runner:
        description: JSON array of runner labels; defaults to the GCP self-hosted pool
        required: false
        type: string
        default: '["self-hosted", "GCP"]'
      db-image:
        description: >-
          Optional Postgres-style image (e.g. pgvector/pgvector:pg16) to run as a
          database service for the test job. Empty string (the default) starts no
          database — existing callers are unaffected. It is started as a
          conditional `docker run` step, not a `services:` block, because a
          `services:` container has no `if:` toggle and rejects an empty image, so
          it cannot be defaulted off without forcing a DB on every caller.
        required: false
        type: string
        default: ''
      db-env:
        description: >-
          Newline-separated KEY=VALUE pairs (dotenv style) used only when
          `db-image` is set. Every POSTGRES_* pair is passed into the database
          container; every pair (including DATABASE_URL) is exported to
          `$GITHUB_ENV` so `npm test` sees it. Example:
            POSTGRES_USER=app
            POSTGRES_PASSWORD=secret
            POSTGRES_DB=app_test
            DATABASE_URL=postgres://app:secret@localhost:5432/app_test

          Values are NOT GitHub-masked (these are inputs, not secrets) and each
          line is written verbatim to $GITHUB_ENV, so pass only trusted data and
          avoid real secrets here. The container binds host port 5432, so only
          one DB-backed job can run per self-hosted host at a time.
        required: false
        type: string
        default: ''
    secrets:
      NODE_AUTH_TOKEN:
        description: Token to read @verjson private packages from GitHub Packages
        required: false
      submodules-token:
        description: >-
          Token to check out private sibling submodules (e.g. the schema repo).
          Falls back to GITHUB_TOKEN when empty — which only reads the current
          repo, so a private sibling submodule requires this token to be set.
        required: false

jobs:
  # Defer CI while a Renovate PR is held by its release-age gate: running the
  # suite now is pure waste — the PR cannot merge until `renovate/stability-days`
  # clears, and Renovate then rebases onto a drifted `main`, re-running
  # everything. This tiny job resolves eligibility once; build-test skips when
  # it says defer, staying BLOCKED until the rebase re-fires CI (Verjson/.github#133).
  eligibility:
    runs-on: ${{ fromJSON(inputs.runner) }}
    permissions:
      # Reading a commit's combined status needs `statuses` (not `contents`).
      # The reusable's token is capped by the caller, so a caller that omits
      # `statuses: read` from its `permissions:` block leaves this read denied —
      # the check then fails OPEN and CI runs as before (see header, ADR 0023).
      statuses: read
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - id: check
        # Pinned to @main, NOT a digest, and NOT @v1. This action is co-located
        # with node-ci and consumed only by it; node-ci is itself consumed @main
        # across the org. The moving `v1` tag lags main until a release is cut, so
        # any v1-based ref (or a digest Renovate resolves FROM v1) points at a
        # commit predating this action → "action not found" for every @main
        # consumer (Verjson/.github#135 pinned exactly such a stale digest). @main
        # is a branch tip, so it always resolves to a commit that has the action.
        # Renovate is told not to digest-pin this self-reference (see renovate.json).
        uses: Verjson/.github/.github/actions/ci-eligibility@main
        with:
          head-sha: ${{ github.event.pull_request.head.sha || github.sha }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  build-test:
    needs: eligibility
    # Fail OPEN at the job level too: only an ACTIVE defer (should-run == 'false')
    # skips the suite. If the eligibility job itself errors (can't resolve the
    # action, runner blip), its output is empty and `always()` still runs CI, so
    # the guard can only ever withhold CI on a genuinely-held PR — never wedge a
    # normal one behind a new single point of failure.
    if: always() && needs.eligibility.outputs.should-run != 'false'
    runs-on: ${{ fromJSON(inputs.runner) }}
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: recursive
          token: ${{ secrets.submodules-token || github.token }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: https://npm.pkg.github.com
          scope: ${{ inputs.scope }}
      - name: Start database service
        # Optional Postgres service for DB-backed test suites (e.g. Jest against
        # pgvector/pgvector:pg16 with DATABASE_URL). Default-off: this whole step
        # is skipped unless a caller sets `db-image`, so the existing no-DB path
        # is untouched. A conditional `docker run` (not `services:`) is used
        # because a `services:` container has no `if:` and an empty image is a
        # hard error — so it can't be toggled off by an empty input. `db-env` is
        # newline-separated KEY=VALUE pairs: every POSTGRES_* pair is passed into
        # the container, and every pair (including DATABASE_URL) is exported to
        # $GITHUB_ENV for the test step.
        id: db-service
        if: inputs.db-image != ''
        env:
          DB_IMAGE: ${{ inputs.db-image }}
          DB_ENV: ${{ inputs.db-env }}
          # Run-scoped name so a finished/failed job never collides with (or
          # leaks onto) the next job on a persistent self-hosted runner.
          CONTAINER_NAME: ci-postgres-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          docker_env=()
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            printf '%s\n' "$line" >> "$GITHUB_ENV"
            case "$line" in
              POSTGRES_*) docker_env+=(-e "$line") ;;
            esac
          done <<< "$DB_ENV"
          docker run -d --name "$CONTAINER_NAME" -p 5432:5432 \
            ${docker_env[@]+"${docker_env[@]}"} "$DB_IMAGE"
          for attempt in $(seq 1 30); do
            if docker exec "$CONTAINER_NAME" pg_isready >/dev/null 2>&1; then
              echo "database is ready"
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "database failed to become ready" >&2
              docker logs "$CONTAINER_NAME" >&2 || true
              exit 1
            fi
            sleep 2
          done
      - name: Stop database service
        # Always tear the run-scoped container down so a completed or failed job
        # can't leave it behind on the persistent self-hosted runner.
        if: always() && inputs.db-image != ''
        env:
          CONTAINER_NAME: ci-postgres-${{ github.run_id }}-${{ github.run_attempt }}
        run: docker rm -f "$CONTAINER_NAME" >/dev/null 2>&1 || true
      - name: Install schema submodule deps
        if: inputs.schema-dir != ''
        working-directory: ${{ inputs.schema-dir }}
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
      - run: npm run build
      - run: npm test
      - run: npm run lint --if-present
