name: actionlint

# Lints the repo's GitHub Actions workflows deterministically, so nit classes the
# merge-gate AI reviewer used to catch by hand (inconsistent/deprecated action
# pins — e.g. #60 — and workflow-expression errors) fail pre-review for free.
# Phase 1 of #43 (issue #80). The GCP self-hosted pool has no Docker socket, so
# actionlint is installed as a pinned release binary rather than a container action.

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/actionlint.yaml'
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/actionlint.yaml'

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: [self-hosted, GCP]
    env:
      ACTIONLINT_VERSION: 1.7.7
      # From actionlint_1.7.7_checksums.txt on the upstream GitHub Release.
      ACTIONLINT_SHA256: '023070a287cd8cccd71515fedc843f1985bf96c436b7effaecce67290e7e0757'
    steps:
      - uses: actions/checkout@v7
      - name: Install actionlint (pinned release binary)
        run: |
          set -euo pipefail
          archive="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          url="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${archive}"
          curl -fsSL "$url" -o "$archive"
          printf '%s  %s\n' "$ACTIONLINT_SHA256" "$archive" | sha256sum --check --strict
          tar -xzf "$archive" actionlint
          ./actionlint --version
      - name: Run actionlint over all workflows
        run: ./actionlint -color
