name: AI review + auto-merge

# ORG-LEVEL autonomous merge gate (viager-docs ADR-018, as amended), required
# on every repo via the main-protection org ruleset.
#
# Cost-lane design (ADR-018 second amendment):
#   1. `preflight` (free, deterministic bash) updates stale branches and routes
#      each current PR into a lane on one runner assignment:
#        - fast: submodule pointer bumps (every new gitlink SHA verified to be
#          on the submodule's default branch), Renovate non-major updates
#          (bot-authored, manifest/lockfile-only diff, `update/<type>` label),
#          and deletions-only PRs. No model is invoked.
#        - ai: everything else gets a Claude review — but only AFTER the rest
#          of CI is green, so red PRs cost $0.
#        - defer: a Renovate PR whose `renovate/stability-days` age gate is
#          still pending (e.g. a replacement PR that `internalChecksFilter`
#          can't hold back). No model, no gate runner — Renovate's rebase once
#          the release ages re-enters classify for a real review.
#   2. Model tiering: routine code PRs are reviewed by Haiku; PRs touching
#      sensitive paths (authz/ABAC, payments/ledger, webhooks, secrets,
#      workflows) get the stronger default model. Turns are capped.
#   3. Reviews run on every ready-PR revision (incl. synchronize) so a
#      Renovate rebase re-fires the gate and the required check stays fresh on
#      the new head; cost stays bounded because fast-lane synchronizes invoke
#      no model and the AI lane only runs after CI is green. Re-run manually by
#      adding the `re-review` label (auto-removed) or via workflow_dispatch.
#
# Either lane merges only on green CI, squash + branch delete, using the
# org-admin ruleset bypass (same mechanism as the catalog auto-bump). Humans
# opt a PR out with the `hold` label, a "DO NOT MERGE" title marker, or by
# keeping it a draft — re-checked at merge time.

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize, labeled, unlabeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to review and (on pass) merge
        required: true
      repository:
        description: owner/repo the PR lives in (defaults to this repo)
        required: false

concurrency:
  group: ai-review-${{ github.event.pull_request.number || inputs.pr_number }}
  # Label events start a workflow before job-level `if:` guards are evaluated.
  # Only gate-control changes may cancel an active review; in particular, the
  # classify step's own removal of `re-review` must not cancel its parent run.
  cancel-in-progress: >-
    ${{
      (github.event.action != 'labeled' && github.event.action != 'unlabeled') ||
      (github.event.action == 'labeled' &&
        (github.event.label.name == 're-review' ||
         github.event.label.name == 'hold' ||
         github.event.label.name == 'DO NOT MERGE')) ||
      (github.event.action == 'unlabeled' &&
        (github.event.label.name == 'hold' || github.event.label.name == 'DO NOT MERGE'))
    }}

permissions:
  contents: read

env:
  PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
  TARGET_REPO: ${{ inputs.repository || github.repository }}

jobs:
  preflight:
    # Keep the branch current with its base BEFORE we review/merge, so a green
    # gate always means green against the *current* base — a behind-but-clean
    # branch never merges stale. Behind → update the branch (the resulting
    # synchronize starts a fresh run that steps this one aside). Conflicting →
    # first try the same update-branch merge (clears a conflict that was only
    # base drift, then steps aside like the behind path); a genuine content
    # conflict still holds and comments (can't auto-resolve). Renovate owns its
    # own rebases, so its branches are left untouched. Same opt-out guard as
    # classify.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        (
          (github.event.action != 'labeled' && github.event.action != 'unlabeled') ||
          (github.event.action == 'labeled' && github.event.label.name == 're-review') ||
          (github.event.action == 'unlabeled' &&
            (github.event.label.name == 'hold' || github.event.label.name == 'DO NOT MERGE'))
        ) &&
        !github.event.pull_request.draft &&
        !contains(github.event.pull_request.labels.*.name, 'hold') &&
        !contains(github.event.pull_request.labels.*.name, 'DO NOT MERGE') &&
        !contains(github.event.pull_request.title, 'DO NOT MERGE')
      )
    runs-on: ${{ github.repository == 'Verjson/.github' && fromJSON('["self-hosted","meta"]') || fromJSON('["self-hosted","gate"]') }}
    # This job combines the former 10-minute freshness and classification jobs.
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
    outputs:
      # 'true' → this run continues to classify/review/merge. 'false' → the branch
      # was just updated; a fresh run will handle it, so downstream jobs skip.
      proceed: ${{ steps.freshness.outputs.proceed }}
      lane: ${{ steps.classify.outputs.lane }}
      reason: ${{ steps.classify.outputs.reason }}
      model: ${{ steps.classify.outputs.model }}
      budget_usd: ${{ steps.classify.outputs.budget_usd }}
      dependency_major: ${{ steps.classify.outputs.dependency_major }}
      head_sha: ${{ steps.classify.outputs.head_sha }}
      completed_at: ${{ steps.preflight_complete.outputs.completed_at }}
    steps:
      - name: Record preflight runner timing
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          set -uo pipefail
          assigned_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          created_at="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" --jq .created_at 2>/dev/null || true)"
          if [ -n "$created_at" ]; then
            queue_seconds=$(( $(date -u -d "$assigned_at" +%s) - $(date -u -d "$created_at" +%s) ))
            echo "::notice::phase=preflight runner_assigned_at=$assigned_at workflow_created_at=$created_at initial_queue_seconds=$queue_seconds"
          else
            echo "::notice::phase=preflight runner_assigned_at=$assigned_at initial_queue_seconds=unknown"
          fi

      - name: Update branch if behind; hold on conflict
        id: freshness
        env:
          # Org-admin token: pushes the base merge onto the (possibly sibling)
          # PR branch and comments — GITHUB_TOKEN can't reach other repos.
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          REPO="$TARGET_REPO"
          out() { echo "$1=$2" >> "$GITHUB_OUTPUT"; }
          # Retry the reads so a transient API blip doesn't red-gate the PR.
          pr_json() {
            for _ in 1 2 3; do
              gh pr view "$PR_NUMBER" --repo "$REPO" --json "$1" 2>/dev/null && return 0
              sleep 3
            done
            return 1
          }

          if ! meta=$(pr_json author,headRefName,baseRefName,headRefOid,mergeable); then
            echo "::warning::could not read PR metadata; proceeding without a freshness action."
            out proceed true; exit 0
          fi
          author="$(jq -r '.author.login // ""' <<<"$meta")"
          head_ref="$(jq -r '.headRefName // ""' <<<"$meta")"
          head_sha="$(jq -r '.headRefOid // ""' <<<"$meta")"
          base_ref="$(jq -r '.baseRefName // "the base branch"' <<<"$meta")"

          # Renovate rebases its own PRs on its stability schedule — leave them to
          # it. Match classify's anchored author pattern (plus the branch prefix).
          if printf '%s' "$author" | grep -qiE '^(app/)?renovate(\[bot\])?$' \
             || [ "${head_ref#renovate/}" != "$head_ref" ]; then
            echo "Renovate PR — leaving freshness to Renovate."; out proceed true; exit 0
          fi

          # mergeable is computed async; wait out UNKNOWN.
          mrg="$(jq -r '.mergeable // "UNKNOWN"' <<<"$meta")"
          for _ in 1 2 3 4 5 6; do
            [ "$mrg" != "UNKNOWN" ] && break
            sleep 5
            mrg="$(jq -r '.mergeable // "UNKNOWN"' <<<"$(pr_json mergeable || echo '{}')")"
          done
          echo "mergeable=$mrg"

          # Base conflict. Try the same non-destructive update-branch (merge base
          # into head) the BEHIND path uses BEFORE giving up: a branch reported
          # CONFLICTING purely from base drift (non-overlapping changes GitHub
          # flags pessimistically) clears once the base is merged in. Re-check
          # mergeability after; if it clears, treat it exactly like the BEHIND
          # success path — the update pushed a `synchronize`, so a fresh run
          # reviews/merges against the current base and this run steps aside
          # (proceed=false). Only a *genuine* content conflict — the update-branch
          # API fails, or mergeable is still CONFLICTING afterwards — falls
          # through to hold (fail-closed) + a single marker-guarded comment.
          if [ "$mrg" = "CONFLICTING" ]; then
            if gh api --method PUT "repos/$REPO/pulls/$PR_NUMBER/update-branch" >/dev/null 2>&1; then
              # Re-read mergeable, again waiting out the async UNKNOWN window.
              mrg="$(jq -r '.mergeable // "UNKNOWN"' <<<"$(pr_json mergeable || echo '{}')")"
              for _ in 1 2 3 4 5 6; do
                [ "$mrg" != "UNKNOWN" ] && break
                sleep 5
                mrg="$(jq -r '.mergeable // "UNKNOWN"' <<<"$(pr_json mergeable || echo '{}')")"
              done
              echo "post-update mergeable=$mrg"
              if [ "$mrg" != "CONFLICTING" ]; then
                echo "Conflict was base drift; update-branch cleared it — a fresh run will merge against the current base."
                out proceed false; exit 0
              fi
            fi
            marker="<!-- gate:branch-conflict -->"
            note="$marker This PR conflicts with \`$base_ref\`. The merge gate can't auto-update a conflicting branch — please rebase/merge \`$base_ref\` and resolve the conflicts; the gate re-fires on push."
            # Dedup only on a *successful* read: a transient read failure must not
            # look like "marker absent" and post a duplicate. If we truly can't
            # read the comments (after pr_json's retries), post anyway — a rare
            # duplicate beats never telling the human why the PR is held.
            if existing="$(pr_json comments)"; then
              jq -r '.comments[].body' <<<"$existing" 2>/dev/null | grep -qF "$marker" \
                || gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$note" || true
            else
              gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$note" || true
            fi
            echo "::error::Branch conflicts with $base_ref — holding until resolved."
            exit 1
          fi

          # Behind the base? Ask the compare API for the real commit delta — it is
          # independent of branch protection, whereas mergeStateStatus only
          # reports BEHIND when a strict "up to date" rule is set (this org's
          # ruleset is NOT strict, so a behind-but-clean branch reads CLEAN).
          # Compare against the head SHA, not the ref, so a slash in the branch
          # name can't confuse the ...-path. Behind → update the branch; the push
          # fires `synchronize`, and that fresh run reviews/merges against the
          # current base, so this run steps aside.
          behind="$(gh api "repos/$REPO/compare/$base_ref...$head_sha" --jq '.behind_by' 2>/dev/null || echo 0)"
          [[ "$behind" =~ ^[0-9]+$ ]] || behind=0
          if [ "$behind" -gt 0 ]; then
            if gh api --method PUT "repos/$REPO/pulls/$PR_NUMBER/update-branch" >/dev/null 2>&1; then
              echo "Branch was $behind commit(s) behind $base_ref; updated it — a fresh run will merge against the current base."
              out proceed false; exit 0
            fi
            echo "update-branch did not apply (race / fork / already current); proceeding."
          fi

          out proceed true

      - name: Classify PR into a lane
        id: classify
        if: steps.freshness.outputs.proceed == 'true'
        env:
          # Org-admin token: classification must read sibling repos
          # (submodule verification) and, for cross-repo dispatch, the target.
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          REPO="$TARGET_REPO"
          out() { echo "$1=$2" >> "$GITHUB_OUTPUT"; }

          meta=$(gh pr view "$PR_NUMBER" --repo "$REPO" \
            --json labels,title,isDraft,author,headRefOid,baseRefName)
          # Re-check opt-outs here too: workflow_dispatch bypasses the job if.
          # A hold is any of: a `hold`/`DO NOT MERGE` label (case- and
          # separator-insensitive, so `do-not-merge` counts — #51), a
          # `DO NOT MERGE` title marker, or draft.
          if jq -e '([.labels[].name | ascii_upcase | gsub("[ _-]+";" ")]) as $l | ($l | index("HOLD")) or ($l | index("DO NOT MERGE")) or (.title | ascii_upcase | contains("DO NOT MERGE")) or .isDraft' <<<"$meta" >/dev/null; then
            echo "PR is held (label/title/draft); no lane."
            out lane held; out reason "held by human opt-out"; out model none
            exit 0
          fi
          head_sha="$(jq -r .headRefOid <<<"$meta")"
          out head_sha "$head_sha"
          out dependency_major false

          # Consume the re-review label so it can be re-applied later.
          gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label re-review 2>/dev/null || true

          # ---- Defer: Renovate release-age gate still pending -------------
          # `internalChecksFilter: strict` holds back version *candidates* that
          # miss `minimumReleaseAge`, so no branch is raised — but a Renovate
          # *replacement* PR bypasses that candidate filter and is raised
          # immediately, carrying a pending `renovate/stability-days` status
          # until the age elapses. Reviewing or merging is impossible until
          # then, so a model review (and the long CI wait on a gate runner)
          # is pure waste that re-burns on every rebase. Defer: emit a lane no
          # downstream job runs for. Renovate's rebase once the release ages
          # fires `synchronize` and re-enters classify for a real review;
          # `workflow_dispatch` forces a review past the gate.
          if [ "${GITHUB_EVENT_NAME:-}" != "workflow_dispatch" ]; then
            age_pending=$(gh api "repos/$REPO/commits/$head_sha/status" \
              --jq '[.statuses[]? | select(.context == "renovate/stability-days" and .state == "pending")] | length' 2>/dev/null || echo 0)
            if [ "${age_pending:-0}" -gt 0 ]; then
              out lane defer
              out reason "Renovate release-age gate pending (renovate/stability-days) — deferring review until minimumReleaseAge elapses and Renovate rebases"
              out model none
              exit 0
            fi
          fi

          files=$(gh api "repos/$REPO/pulls/$PR_NUMBER/files" --paginate --jq '.[]' | jq -s .)
          nfiles=$(jq length <<<"$files")
          if [ "$nfiles" -eq 0 ]; then
            out lane ai; out reason "empty diff — needs a look"; out model claude-haiku-4-5
            out budget_usd 0.15
            exit 0
          fi

          # Model tier for the AI lane: sensitive paths get the strong model.
          if jq -e '[.[].filename] | any(test("(^|/)\\.github/|abac|(^|/|[._-])auth|polic|payment|ledger|webhook|secret|middleware|rbac|rls"; "i"))' <<<"$files" >/dev/null; then
            model=claude-sonnet-5
            # Workflow/security reviews get the strong model and more budget. If
            # even this exhausts, the review escalates (see the ai-review job)
            # instead of failing, so the cap is a floor to escalate from, not a
            # hard wall. The 15-turn cap bounds exploration.
            budget_usd=0.50
          else
            model=claude-haiku-4-5
            budget_usd=0.15
          fi
          out model "$model"
          out budget_usd "$budget_usd"

          # ---- Fast lane A: submodule pointer bump -------------------------
          # Every changed file is a gitlink hunk, and each new SHA is already
          # on the submodule's default branch (identical or behind = ancestor).
          if jq -e 'all(.[]; (.patch // "") | test("^@@[^\\n]*\\n(-Subproject commit [0-9a-f]{40}\\n?|\\+Subproject commit [0-9a-f]{40}\\n?)+$"))' <<<"$files" >/dev/null; then
            base=$(jq -r .baseRefName <<<"$meta")
            gm=$(mktemp)
            gh api "repos/$REPO/contents/.gitmodules?ref=$base" --jq .content | base64 -d > "$gm"
            ok=true
            while IFS=$'\t' read -r path sha; do
              name=$(git config -f "$gm" --list | awk -F= -v p="$path" '$2==p && $1 ~ /\.path$/ {sub(/^submodule\./,"",$1); sub(/\.path$/,"",$1); print $1; exit}')
              url=$(git config -f "$gm" --get "submodule.$name.url" || true)
              sub=$(sed -E 's#^(git@github\.com:|https://github\.com/)##; s#\.git$##; s#/*$##' <<<"$url")
              if [ -z "$sub" ]; then ok=false; echo "no submodule mapping for $path"; break; fi
              def=$(gh api "repos/$sub" --jq .default_branch)
              status=$(gh api "repos/$sub/compare/$def...$sha" --jq .status 2>/dev/null || echo unknown)
              echo "gitlink $path -> $sub@$sha vs $def: $status"
              case "$status" in identical|behind) ;; *) ok=false; break ;; esac
            done < <(jq -r '.[] | [.filename, ((.patch // "") | capture("\\+Subproject commit (?<s>[0-9a-f]{40})").s)] | @tsv' <<<"$files")
            if $ok; then
              out lane fast
              out reason "submodule pointer bump: every new gitlink SHA verified on its submodule's default branch"
              exit 0
            fi
          fi

          # ---- Fast lane B: Renovate non-major dependency update ----------
          author=$(jq -r .author.login <<<"$meta")
          if [[ "$author" =~ ^(app/)?renovate(\[bot\])?$ ]]; then
            commit_ok=$(gh api "repos/$REPO/pulls/$PR_NUMBER/commits" --paginate --jq '.[] | (.author.login // "MISSING")' \
              | jq -Rs 'split("\n") | map(select(length > 0)) | all(test("^renovate(\\[bot\\])?$"))')
            nonmajor=$(jq '.labels | map(.name) | any(test("^update/(patch|minor|pin|digest|pinDigest|lockFileMaintenance)$"))' <<<"$meta")
            # Keep the implementation aligned with the documented guarantee:
            # bot identity and labels alone are not enough for the fast lane.
            files_ok=$(jq '[.[].filename] | all(test("(^|/)(package(-lock)?\\.json|pnpm-lock\\.yaml|yarn\\.lock|bun\\.lockb?|Cargo\\.(toml|lock)|go\\.(mod|sum)|requirements[^/]*\\.txt|poetry\\.lock|pyproject\\.toml|Gemfile(\\.lock)?|composer\\.(json|lock)|gradle\\.lockfile|pom\\.xml|Chart\\.yaml|Chart\\.lock|values[^/]*\\.ya?ml|Dockerfile|\\.github/dependabot\\.yml)$"))' <<<"$files")
            if [ "$commit_ok" = true ] && [ "$nonmajor" = true ] && [ "$files_ok" = true ]; then
              out lane fast
              out reason "Renovate non-major update: bot-authored commits only, update-type label $(jq -r '.labels|map(.name)|map(select(startswith("update/")))|join(",")' <<<"$meta")"
              exit 0
            fi
            major=$(jq '.labels | map(.name) | index("update/major") != null' <<<"$meta")
            [ "$major" = true ] && out dependency_major true
            echo "renovate PR but not fast-lane eligible: commits_ok=$commit_ok nonmajor=$nonmajor files_ok=$files_ok"
          fi

          # Documentation and community-health changes have no executable
          # behavior. CI remains mandatory, but a model review adds little.
          if jq -e '[.[].filename] | all(test("(^NEXT(\\.md|/[^/]+\\.md)$|(^|/)(docs/.*|README(\\.[^/]*)?|CHANGELOG(\\.[^/]*)?|CONTRIBUTING(\\.[^/]*)?|CODE_OF_CONDUCT(\\.[^/]*)?|SECURITY(\\.[^/]*)?|SUPPORT(\\.[^/]*)?|LICENSE(\\.[^/]*)?|\\.github/(ISSUE_TEMPLATE/.*|PULL_REQUEST_TEMPLATE\\.md|FUNDING\\.yml))$)"; "i"))' <<<"$files" >/dev/null; then
            out lane fast
            out reason "documentation/community-health-only change ($nfiles file(s)); CI must still pass"
            exit 0
          fi

          # ---- Fast lane C: deletions-only ---------------------------------
          if jq -e 'all(.[]; .status == "removed")' <<<"$files" >/dev/null; then
            out lane fast
            out reason "deletions-only PR ($nfiles file(s) removed, no content added); CI must still pass"
            exit 0
          fi

          out lane ai
          out reason "code change — AI review required (model: $model)"

      - name: Record preflight completion
        id: preflight_complete
        if: always()
        run: |
          completed_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "completed_at=$completed_at" >> "$GITHUB_OUTPUT"
          echo "::notice::phase=preflight completed_at=$completed_at lane=${{ steps.classify.outputs.lane || 'none' }} proceed=${{ steps.freshness.outputs.proceed || 'unknown' }}"

  gate:
    needs: preflight
    if: needs.preflight.outputs.lane == 'fast' || needs.preflight.outputs.lane == 'ai'
    runs-on: ${{ github.repository == 'Verjson/.github' && fromJSON('["self-hosted","meta"]') || fromJSON('["self-hosted","gate"]') }}
    # Fast retains its former 45-minute merge ceiling. AI gets one bounded
    # aggregate ceiling for the 30-minute CI wait + the former 45-minute review
    # allowance + checkout/debounce/submit/recheck buffer.
    timeout-minutes: ${{ needs.preflight.outputs.lane == 'ai' && 80 || 45 }}
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
    env:
      LANE: ${{ needs.preflight.outputs.lane }}
      LANE_REASON: ${{ needs.preflight.outputs.reason }}
      EXPECTED_HEAD_SHA: ${{ needs.preflight.outputs.head_sha }}
    steps:
      - name: Record gate runner timing
        env:
          PREFLIGHT_COMPLETED_AT: ${{ needs.preflight.outputs.completed_at }}
        run: |
          set -uo pipefail
          assigned_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          if [ -n "$PREFLIGHT_COMPLETED_AT" ]; then
            queue_seconds=$(( $(date -u -d "$assigned_at" +%s) - $(date -u -d "$PREFLIGHT_COMPLETED_AT" +%s) ))
            echo "::notice::phase=gate runner_assigned_at=$assigned_at preflight_completed_at=$PREFLIGHT_COMPLETED_AT transition_queue_seconds=$queue_seconds lane=$LANE"
          else
            echo "::notice::phase=gate runner_assigned_at=$assigned_at transition_queue_seconds=unknown lane=$LANE"
          fi

      # CI-first: never pay for a model review of a PR that fails its own CI.
      # The fast lane keeps its existing 40-minute ceiling; the AI lane keeps
      # its existing 30-minute pre-review ceiling. This is the only long CI wait.
      - name: Wait once for the rest of CI to be green
        id: ci_wait
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          started_epoch="$(date +%s)"
          max_attempts=60
          [ "$LANE" = "fast" ] && max_attempts=80
          echo "::notice::phase=ci-wait started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ) lane=$LANE max_attempts=$max_attempts poll_seconds=30"
          for i in $(seq 1 "$max_attempts"); do
            rollup=$(gh pr view "$PR_NUMBER" --repo "$TARGET_REPO" \
              --json statusCheckRollup \
              --jq '[.statusCheckRollup[]? | select((.name // .context) as $n | $n != "preflight" and $n != "gate" and $n != "freshness" and $n != "classify" and $n != "ai-review" and $n != "ai-merge" and $n != "review")]')
            # Rollup mixes CheckRuns (name/status/conclusion) with commit
            # StatusContexts like renovate/stability-days (context/state) —
            # treating a context's null .status as pending hangs the gate.
            # Completed CheckRuns are green only when GitHub concluded SUCCESS,
            # NEUTRAL, or SKIPPED. Every other/unknown conclusion fails closed.
            # Commit StatusContexts retain their SUCCESS/PENDING/EXPECTED states;
            # every other state fails closed.
            failed=$(jq '[.[] | select(
              if .state then
                ((.state // "") | IN("SUCCESS","PENDING","EXPECTED") | not)
              else
                (.status == "COMPLETED" and ((.conclusion // "") | IN("SUCCESS","NEUTRAL","SKIPPED") | not))
              end
            )] | length' <<<"$rollup")
            pending=$(jq -r '[.[] | select(if .state then (.state | IN("PENDING","EXPECTED")) else .status != "COMPLETED" end) | "\(.name // .context)=\(.state // .status)"] | join(", ")' <<<"$rollup")
            if [ "$failed" -gt 0 ]; then
              elapsed=$(( $(date +%s) - started_epoch ))
              echo "::error::phase=ci-wait result=failed elapsed_seconds=$elapsed lane=$LANE"
              echo "CI is red for PR #$PR_NUMBER — not reviewing or merging."
              exit 1
            fi
            if [ -z "$pending" ]; then
              elapsed=$(( $(date +%s) - started_epoch ))
              echo "::notice::phase=ci-wait result=green elapsed_seconds=$elapsed attempts=$i lane=$LANE"
              exit 0
            fi
            elapsed=$(( $(date +%s) - started_epoch ))
            echo "phase=ci-wait elapsed_seconds=$elapsed attempt=$i/$max_attempts pending=$pending"
            sleep 30
          done
          elapsed=$(( $(date +%s) - started_epoch ))
          echo "::error::phase=ci-wait result=timeout elapsed_seconds=$elapsed lane=$LANE pending=$pending"
          exit 1

      - name: Checkout PR head
        if: needs.preflight.outputs.lane == 'ai'
        uses: actions/checkout@v7
        with:
          repository: ${{ env.TARGET_REPO }}
          ref: ${{ needs.preflight.outputs.head_sha }}
          token: ${{ secrets.ORG_ADMIN_TOKEN }}
          fetch-depth: 2

      - name: Prepare bounded review context
        id: prep
        if: needs.preflight.outputs.lane == 'ai'
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
          DEPENDENCY_MAJOR: ${{ needs.preflight.outputs.dependency_major }}
        run: |
          set -euo pipefail
          mkdir -p .ai-review
          gh pr view "$PR_NUMBER" --repo "$TARGET_REPO" \
            --json title,body,author,labels,baseRefName,headRefName,additions,deletions,changedFiles \
            > .ai-review/pr.json
          gh pr diff "$PR_NUMBER" --repo "$TARGET_REPO" > .ai-review/pr.full.diff

          # Elide generated lockfiles from the review payload. A lockfile is a
          # derived artifact — the reviewer scrutinizes the manifest
          # (package.json, Cargo.toml, …), never the machine-generated lock. An
          # 8k-line package-lock in the diff once consumed the whole review
          # budget and produced a no-verdict, fail-closed run on an
          # otherwise-small PR (Verjson/.github#110). Keep the full diff on disk
          # for reference; hand the model the filtered diff plus a note of what
          # was dropped so it still scrutinizes the manifest counterpart.
          LOCK_RE='(^|/)(package-lock\.json|npm-shrinkwrap\.json|pnpm-lock\.yaml|yarn\.lock|bun\.lockb?|Cargo\.lock|go\.sum|poetry\.lock|composer\.lock|gradle\.lockfile|Gemfile\.lock)$'
          awk -v re="$LOCK_RE" '
            /^diff --git / { p = $4; sub(/^b\//, "", p); keep = (p !~ re) }
            keep
          ' .ai-review/pr.full.diff > .ai-review/pr.diff
          elided_lockfiles="$(awk -v re="$LOCK_RE" '
            /^diff --git / { p = $4; sub(/^b\//, "", p);
              if (p ~ re) out = out (out == "" ? "" : ", ") p }
            END { print out }
          ' .ai-review/pr.full.diff)"

          # Debounce synchronize bursts. Concurrency cancels an older run, and
          # this SHA check ensures a superseded revision never reaches Claude.
          sleep 30
          current=$(gh pr view "$PR_NUMBER" --repo "$TARGET_REPO" --json headRefOid --jq .headRefOid)
          [ "$current" = "${{ needs.preflight.outputs.head_sha }}" ] || {
            echo "PR head moved to $current during debounce; a newer run will review it."
            exit 1
          }

          # Compose the review prompt once. Both the first pass and, if it runs
          # out of budget/turns, the escalation pass reuse it verbatim so the
          # two reviews never drift. The economy instruction (read the diff,
          # then only the files a finding depends on) keeps the agentic loop
          # from wandering the tree and burning tokens on context resends.
          major_note=""
          if [ "$DEPENDENCY_MAJOR" = "true" ]; then
            major_note="This is a major dependency update. Also inspect the changed dependency version and repository evidence for breaking changes, deprecations, migrations, and security-relevant fixes."
          fi
          lockfile_note=""
          if [ -n "$elided_lockfiles" ]; then
            lockfile_note="Generated lockfile(s) were omitted from the diff to conserve review budget: ${elided_lockfiles}. Their manifest changes (package.json, Cargo.toml, requirements, etc.) ARE in the diff — review those; do not open or request the lockfile itself."
          fi
          {
            echo "review_prompt<<PROMPT_EOF"
            cat <<EOF
          You are the autonomous merge gate for ${TARGET_REPO}.
          Review PR #${PR_NUMBER} in ${TARGET_REPO}.
          Metadata is in .ai-review/pr.json and the diff (with generated
          lockfiles elided) is in .ai-review/pr.diff. Read those two files
          first, then open only the
          specific repository files a potential finding actually depends on —
          be economical and do not broadly explore the tree.

          Review for, in priority order:
          1. Correctness bugs and behavioral regressions.
          2. Security: authn/authz changes, tenant isolation, secret
             handling, input validation at boundaries, injection.
          3. Money-handling invariants (integer minor units, double-entry
             balance, idempotency, provider-confirmed amounts only).
          4. Missing or weakened tests for changed behavior.
          Style-only nits are not blocking; mention at most briefly.

          ${major_note}

          ${lockfile_note}

          Return the required JSON verdict as soon as you can support it. Do
          not call GitHub or submit a review yourself. Set blocking=true only
          for real defects. Each blocking finding (in "findings") must include
          file:line, why it is wrong, and a concrete failure scenario. Keep
          summary concise.

          Also return "review_first": the specific file:line hunks a human
          should eyeball first, highest blast-radius first, each with a one-line
          reason it is load-bearing. This is MANDATORY (must be non-empty) when
          the diff touches a sensitive area — authn/authz, RBAC/ABAC, secrets,
          IAM/OIDC, database migrations, money-handling, or CI / rulesets /
          branch protection — so the human's eye lands on the exact lines that
          matter even when the verdict is to approve. For a low-risk diff (docs,
          formatting, a trivial change) it may be empty.

          Also return "followups": substantive but non-blocking findings — real
          bugs or improvements that do not justify blocking this merge, each as
          {location, note}. These are filed as tracking issues when the PR
          merges, so nothing worth doing is lost. Do NOT put pure style /
          formatting / naming nitpicks here; mention those (at most briefly) in
          the summary only. Empty when there is nothing substantive to follow up.

          Be skeptical but calibrated: block on real defects, not
          hypotheticals. A docs-only PR with sane content should simply be
          approved.
          EOF
            echo "PROMPT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Record model phase start
        id: model_timing
        if: needs.preflight.outputs.lane == 'ai'
        run: |
          started_epoch="$(date +%s)"
          echo "started_epoch=$started_epoch" >> "$GITHUB_OUTPUT"
          echo "::notice::phase=model started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ) model=${{ needs.preflight.outputs.model }} budget_usd=${{ needs.preflight.outputs.budget_usd }}"

      - name: Claude review (merge gate)
        id: claude
        if: needs.preflight.outputs.lane == 'ai'
        # Do not fail the job on budget/turn exhaustion — the next step
        # inspects the (empty) verdict and escalates instead of dying here.
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.ORG_ADMIN_TOKEN }}
          # Renovate opens PRs as a bot actor; without this the action
          # refuses to run (majors and non-standard bot PRs reach this lane).
          allowed_bots: "renovate,renovate[bot],mend[bot]"
          prompt: ${{ steps.prep.outputs.review_prompt }}
          claude_args: |
            --model ${{ needs.preflight.outputs.model }}
            --max-turns 15
            --max-budget-usd ${{ needs.preflight.outputs.budget_usd }}
            --json-schema '{"type":"object","properties":{"blocking":{"type":"boolean"},"summary":{"type":"string"},"review_first":{"type":"array","items":{"type":"object","properties":{"location":{"type":"string"},"why":{"type":"string"}},"required":["location","why"],"additionalProperties":false}},"findings":{"type":"array","items":{"type":"string"}},"followups":{"type":"array","items":{"type":"object","properties":{"location":{"type":"string"},"note":{"type":"string"}},"required":["location","note"],"additionalProperties":false}}},"required":["blocking","summary","review_first","findings","followups"],"additionalProperties":false}'
            --allowedTools "Read,Grep,Glob"

      # Budget/turn exhaustion returns an empty structured_output (subtype
      # error_max_budget_usd / error_max_turns) — a signal the PR is bigger than
      # the cheap tier, NOT a review failure. Escalate to the strongest model
      # with a larger budget. A fresh pass (not --resume): the first session's
      # state may not survive into a second action invocation, and a resume that
      # errored would strand the very PR we are trying to unblock. Runs only when
      # the first pass produced no verdict, so the common case never reaches here.
      - name: Escalate review when the first pass ran out of budget or turns
        id: claude_retry
        if: needs.preflight.outputs.lane == 'ai' && steps.claude.outputs.structured_output == ''
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.ORG_ADMIN_TOKEN }}
          allowed_bots: "renovate,renovate[bot],mend[bot]"
          prompt: ${{ steps.prep.outputs.review_prompt }}
          claude_args: |
            --model claude-sonnet-5
            --max-turns 30
            --max-budget-usd 1.00
            --json-schema '{"type":"object","properties":{"blocking":{"type":"boolean"},"summary":{"type":"string"},"review_first":{"type":"array","items":{"type":"object","properties":{"location":{"type":"string"},"why":{"type":"string"}},"required":["location","why"],"additionalProperties":false}},"findings":{"type":"array","items":{"type":"string"}},"followups":{"type":"array","items":{"type":"object","properties":{"location":{"type":"string"},"note":{"type":"string"}},"required":["location","note"],"additionalProperties":false}}},"required":["blocking","summary","review_first","findings","followups"],"additionalProperties":false}'
            --allowedTools "Read,Grep,Glob"

      # One more bounded attempt when BOTH prior passes produced no verdict.
      # error_max_structured_output_retries is a *transient* failure of the model
      # to emit the tool call (distinct from budget/turns), and it has struck the
      # first pass and the escalation in the same run (#64). Because the flakes are
      # roughly independent, a third strong-tier attempt clears it far more often
      # than not — before the deterministic submit fails closed. Still fail-closed
      # if this also comes back empty. Guarded on BOTH prior outputs being empty so
      # a clean first (or second) pass never reaches here.
      - name: Second escalation when both prior passes produced no verdict (#64)
        id: claude_retry2
        if: needs.preflight.outputs.lane == 'ai' && steps.claude.outputs.structured_output == '' && steps.claude_retry.outputs.structured_output == ''
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.ORG_ADMIN_TOKEN }}
          allowed_bots: "renovate,renovate[bot],mend[bot]"
          prompt: ${{ steps.prep.outputs.review_prompt }}
          claude_args: |
            --model claude-sonnet-5
            --max-turns 30
            --max-budget-usd 1.00
            --json-schema '{"type":"object","properties":{"blocking":{"type":"boolean"},"summary":{"type":"string"},"review_first":{"type":"array","items":{"type":"object","properties":{"location":{"type":"string"},"why":{"type":"string"}},"required":["location","why"],"additionalProperties":false}},"findings":{"type":"array","items":{"type":"string"}},"followups":{"type":"array","items":{"type":"object","properties":{"location":{"type":"string"},"note":{"type":"string"}},"required":["location","note"],"additionalProperties":false}}},"required":["blocking","summary","review_first","findings","followups"],"additionalProperties":false}'
            --allowedTools "Read,Grep,Glob"

      - name: Record model retry outcome
        if: always() && needs.preflight.outputs.lane == 'ai'
        env:
          STARTED_EPOCH: ${{ steps.model_timing.outputs.started_epoch }}
          FIRST_VERDICT: ${{ steps.claude.outputs.structured_output != '' }}
          RETRY1_VERDICT: ${{ steps.claude_retry.outputs.structured_output != '' }}
          RETRY2_VERDICT: ${{ steps.claude_retry2.outputs.structured_output != '' }}
          RETRY1_CONCLUSION: ${{ steps.claude_retry.conclusion }}
          RETRY2_CONCLUSION: ${{ steps.claude_retry2.conclusion }}
        run: |
          elapsed=unknown
          if [[ "$STARTED_EPOCH" =~ ^[0-9]+$ ]]; then
            elapsed=$(( $(date +%s) - STARTED_EPOCH ))
          fi
          echo "::notice::phase=model elapsed_seconds=$elapsed first_verdict=$FIRST_VERDICT retry1_conclusion=$RETRY1_CONCLUSION retry1_verdict=$RETRY1_VERDICT retry2_conclusion=$RETRY2_CONCLUSION retry2_verdict=$RETRY2_VERDICT"

      - name: Submit deterministic PR review
        id: submit
        if: needs.preflight.outputs.lane == 'ai'
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
          # Prefer the latest non-empty verdict: second escalation, then first
          # escalation, then the cheap first pass.
          VERDICT: ${{ steps.claude_retry2.outputs.structured_output != '' && steps.claude_retry2.outputs.structured_output || (steps.claude_retry.outputs.structured_output != '' && steps.claude_retry.outputs.structured_output || steps.claude.outputs.structured_output) }}
          # Passed via env (not inline ${{ }}) so the block is plain bash and can
          # be extracted and unit-tested (scripts/ci-gate/review-comment.test.sh).
          HEAD_SHA: ${{ needs.preflight.outputs.head_sha }}
          MODEL: ${{ needs.preflight.outputs.model }}
        run: |
          set -euo pipefail
          # Neither pass produced a verdict (budget/turn exhaustion or a hard
          # error on both attempts). Fail closed — never merge unreviewed — but
          # leave an explained, actionable record and flag for a human instead
          # of dying on the action's cryptic "did not return structured_output".
          if ! jq -e '.blocking | type == "boolean"' <<<"$VERDICT" >/dev/null 2>&1; then
            gh pr edit "$PR_NUMBER" --repo "$TARGET_REPO" --add-label ai-review-inconclusive 2>/dev/null || true
            gh pr comment "$PR_NUMBER" --repo "$TARGET_REPO" --body "⚠️ **Merge gate: review could not complete**

          The automated review produced no verdict across all three passes (budget/turn exhaustion, or the model failed to return a structured verdict on every attempt). This PR was **not** auto-merged. A maintainer should review and merge it manually."
            exit 1
          fi
          # Expose the verdict so this gate job can file follow-up issues for the
          # non-blocking findings once (and only if) the PR actually merges.
          {
            echo "verdict<<VERDICT_EOF"
            printf '%s\n' "$VERDICT"
            echo "VERDICT_EOF"
          } >>"$GITHUB_OUTPUT"
          body=$(jq -r '
            .summary
            + (if ((.review_first // []) | length) > 0
               then "\n\n**👀 Review these first**\n"
                    + (.review_first | map("- `" + .location + "` — " + .why) | join("\n"))
               else "" end)
            + (if ((.findings // []) | length) > 0
               then "\n\n**Findings**\n" + (.findings | map("- " + .) | join("\n"))
               else "" end)
            + (if ((.followups // []) | length) > 0
               then "\n\n**Follow-ups** (filed as issues on merge)\n"
                    + (.followups | map("- `" + .location + "` — " + .note) | join("\n"))
               else "" end)
          ' <<<"$VERDICT")
          body="$body

          <!-- ai-review-head:${HEAD_SHA} model:${MODEL} -->"
          if [ "$(jq -r .blocking <<<"$VERDICT")" = true ]; then
            # A token may be the PR author's identity. GitHub forbids a user
            # reviewing their own PR, but the non-zero result must still block
            # the admin merge and leave an auditable record.
            gh pr review "$PR_NUMBER" --repo "$TARGET_REPO" --request-changes --body "$body" \
              || gh pr comment "$PR_NUMBER" --repo "$TARGET_REPO" --body "🚫 **Merge gate: blocking verdict**

            $body"
            exit 1
          fi
          if ! approval_error=$(gh pr review "$PR_NUMBER" --repo "$TARGET_REPO" --approve --body "$body" 2>&1); then
            if [[ "$approval_error" != *"Can not approve your own pull request"* ]]; then
              echo "$approval_error" >&2
              exit 1
            fi
            # The required gate check remains the enforcement
            # mechanism. A comment is the only GitHub-permitted audit record
            # when GitHub rejects the configured token's self-approval.
            gh pr comment "$PR_NUMBER" --repo "$TARGET_REPO" --body "✅ **Merge gate: approved verdict**

            $body"
          fi

      # --- CI telemetry (best-effort). Every step is `continue-on-error` so it
      # can NEVER fail or block the gate, and it stays dormant until
      # OTEL_EXPORTER_OTLP_ENDPOINT is set — the composite action no-ops without
      # an endpoint. Emits one CiTelemetryPayload for the review. See ADR 0004
      # and docs/ci-telemetry.md.
      - name: Fetch telemetry helper scripts
        if: always() && needs.preflight.outputs.lane == 'ai'
        continue-on-error: true
        uses: actions/checkout@v7
        with:
          repository: Verjson/.github
          ref: main
          path: .gate-tools
          sparse-checkout: scripts/ci-telemetry
          sparse-checkout-cone-mode: false

      - name: Build ai-review telemetry payload
        if: always() && needs.preflight.outputs.lane == 'ai'
        continue-on-error: true
        env:
          VERDICT_JSON: ${{ steps.claude_retry2.outputs.structured_output != '' && steps.claude_retry2.outputs.structured_output || (steps.claude_retry.outputs.structured_output != '' && steps.claude_retry.outputs.structured_output || steps.claude.outputs.structured_output) }}
          EXECUTION_FILE: ${{ steps.claude_retry2.outputs.execution_file != '' && steps.claude_retry2.outputs.execution_file || (steps.claude_retry.outputs.execution_file != '' && steps.claude_retry.outputs.execution_file || steps.claude.outputs.execution_file) }}
          ACTION_CONCLUSION: ${{ steps.claude_retry2.conclusion != 'skipped' && steps.claude_retry2.conclusion || (steps.claude_retry.conclusion != 'skipped' && steps.claude_retry.conclusion || steps.claude.conclusion) }}
          LANE: ${{ needs.preflight.outputs.lane }}
          LANE_REASON: ${{ needs.preflight.outputs.reason }}
          MODEL: ${{ needs.preflight.outputs.model }}
          BUDGET_USD: ${{ needs.preflight.outputs.budget_usd }}
          DEPENDENCY_MAJOR: ${{ needs.preflight.outputs.dependency_major }}
        run: |
          set -uo pipefail    # deliberately no -e: telemetry must never abort
          mkdir -p .telemetry
          exec_summary=$(.gate-tools/scripts/ci-telemetry/parse-claude-execution.sh "${EXECUTION_FILE:-}" 2>/dev/null || echo '{}')
          verdict_blocking=null
          findings_count=null
          if [ -n "${VERDICT_JSON:-}" ] && jq -e . >/dev/null 2>&1 <<<"$VERDICT_JSON"; then
            verdict_blocking=$(jq -c '.blocking // null' <<<"$VERDICT_JSON")
            findings_count=$(jq -c '(.findings // []) | length' <<<"$VERDICT_JSON")
          fi
          jq -n \
            --arg repository "$TARGET_REPO" \
            --arg workflow_name "$GITHUB_WORKFLOW" \
            --arg event_name "$GITHUB_EVENT_NAME" \
            --arg lane "${LANE:-}" \
            --arg lane_reason "${LANE_REASON:-}" \
            --arg model_selected "${MODEL:-}" \
            --arg action_conclusion "${ACTION_CONCLUSION:-}" \
            --argjson budget_usd "${BUDGET_USD:-0}" \
            --argjson dependency_major "${DEPENDENCY_MAJOR:-false}" \
            --argjson verdict_blocking "$verdict_blocking" \
            --argjson findings_count "$findings_count" \
            --argjson exec "$exec_summary" \
            '{
              schema_version: 1,
              verjson_project: "verjson",
              repository: $repository,
              workflow_name: $workflow_name,
              job_name: "ai-review",
              event_name: $event_name,
              lane: $lane,
              review_type: "ai",
              lane_reason: (if $lane_reason == "" then null else $lane_reason end),
              model_selected: (if $model_selected == "" then null else $model_selected end),
              budget_usd: $budget_usd,
              dependency_major: $dependency_major,
              verdict_blocking: $verdict_blocking,
              findings_count: $findings_count,
              action_conclusion: (if $action_conclusion == "" then null else $action_conclusion end),
              execution_file_present: ($exec.execution_file_present // false),
              execution_file_parse_ok: ($exec.execution_file_parse_ok // false),
              total_cost_usd: ($exec.total_cost_usd // null),
              total_turns: ($exec.num_turns // null)
            }' > .telemetry/ai-review.json

      # NOTE: OTLP emit temporarily removed. `uses: Verjson/verjson-observability`
      # resolves on the gce runners but NOT on gha-meta-1 (used for this repo's
      # own PRs + workflow_dispatch), and `uses:` resolution at job-setup is not
      # guarded by continue-on-error, so it failed the whole ai-review job on
      # meta. The payload is still built above (dormant). Re-add the emit step
      # once the meta runner can resolve the private action AND the OTLP
      # endpoint is provisioned (see docs/ci-telemetry.md, ADR 0004).

      - name: Authoritative merge recheck and squash-merge
        id: merge
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          REPO="$TARGET_REPO"
          merge_started_epoch="$(date +%s)"
          echo "::notice::phase=merge-recheck started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ) lane=$LANE expected_head=$EXPECTED_HEAD_SHA"
          # Re-check the opt-outs at merge time — the authoritative hold gate:
          # a `hold`/`DO NOT MERGE` label added after classification must still
          # stop the merge. Match is case- and separator-insensitive so a
          # `DO NOT MERGE` *label* (not just the title marker) holds too — #51.
          meta=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json labels,title,isDraft,state,headRefOid)
          if jq -e '([.labels[].name | ascii_upcase | gsub("[ _-]+";" ")]) as $l | ($l | index("HOLD")) or ($l | index("DO NOT MERGE")) or (.title | ascii_upcase | contains("DO NOT MERGE")) or .isDraft' <<<"$meta" >/dev/null; then
            echo "PR #$PR_NUMBER is held (label/title/draft); not merging."
            exit 0
          fi
          if [ "$(jq -r .state <<<"$meta")" != "OPEN" ]; then
            echo "PR #$PR_NUMBER is no longer open; nothing to do."
            exit 0
          fi
          current_head="$(jq -r '.headRefOid // ""' <<<"$meta")"
          if [ -z "$EXPECTED_HEAD_SHA" ] || [ "$current_head" != "$EXPECTED_HEAD_SHA" ]; then
            echo "::error::phase=merge-recheck result=head-changed expected=$EXPECTED_HEAD_SHA current=$current_head"
            exit 1
          fi

          # One immediate, authoritative CI snapshot. There is deliberately no
          # second polling loop after model spend: pending, red, or inconclusive
          # state fails closed and a later event/re-run can attempt the new head.
          rollup=$(gh pr view "$PR_NUMBER" --repo "$REPO" \
            --json statusCheckRollup \
            --jq '[.statusCheckRollup[]? | select((.name // .context) as $n | $n != "preflight" and $n != "gate" and $n != "freshness" and $n != "classify" and $n != "ai-review" and $n != "ai-merge" and $n != "review")]')
          failed=$(jq '[.[] | select(
            if .state then
              ((.state // "") | IN("SUCCESS","PENDING","EXPECTED") | not)
            else
              (.status == "COMPLETED" and ((.conclusion // "") | IN("SUCCESS","NEUTRAL","SKIPPED") | not))
            end
          )] | length' <<<"$rollup")
          pending=$(jq -r '[.[] | select(if .state then (.state | IN("PENDING","EXPECTED")) else .status != "COMPLETED" end) | "\(.name // .context)=\(.state // .status)"] | join(", ")' <<<"$rollup")
          if [ "$failed" -gt 0 ]; then
            echo "::error::phase=merge-recheck result=failed elapsed_seconds=$(( $(date +%s) - merge_started_epoch ))"
            jq -r '.[] | select(if .state then ((.state // "") | IN("SUCCESS","PENDING","EXPECTED") | not) else (.status == "COMPLETED" and ((.conclusion // "") | IN("SUCCESS","NEUTRAL","SKIPPED") | not)) end) | (.name // .context)' <<<"$rollup"
            exit 1
          fi
          if [ -n "$pending" ]; then
            echo "::error::phase=merge-recheck result=pending elapsed_seconds=$(( $(date +%s) - merge_started_epoch )) pending=$pending"
            exit 1
          fi
          if [ "$LANE" = "fast" ]; then
            # Audit trail: the fast lane's written record replaces the AI review.
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "✅ **Merge gate: fast lane** (no AI review needed) — ${LANE_REASON}. All CI checks green; squash-merging." || true
          fi
          echo "All checks green and head unchanged; merging PR #$PR_NUMBER (lane: $LANE)."
          gh pr merge "$PR_NUMBER" --repo "$REPO" --squash --admin --delete-branch \
            --match-head-commit "$EXPECTED_HEAD_SHA"
          echo "::notice::phase=merge result=merged elapsed_seconds=$(( $(date +%s) - merge_started_epoch )) lane=$LANE"

      - name: File follow-up issues for non-blocking findings
        if: ${{ !cancelled() && steps.merge.outcome == 'success' && steps.submit.outputs.verdict != '' }}
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
          VERDICT: ${{ steps.submit.outputs.verdict }}
        run: |
          set -uo pipefail
          REPO="$TARGET_REPO"
          # Only file for findings on a PR that actually merged — an open PR may
          # still fix them on the next push. Check state, not step success (the
          # merge step also exits 0 when a PR is held or already closed).
          state=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json state --jq .state 2>/dev/null || echo "")
          if [ -z "$state" ]; then
            echo "::warning::Could not read PR #$PR_NUMBER state; skipping follow-up filing."
            exit 0
          fi
          if [ "$state" != "MERGED" ]; then
            echo "PR #$PR_NUMBER is $state, not MERGED; no follow-ups filed."
            exit 0
          fi

          mapfile -t items < <(jq -c '(.followups // [])[]' <<<"$VERDICT" 2>/dev/null)
          if [ "${#items[@]}" -eq 0 ]; then
            echo "No follow-ups in the verdict."
            exit 0
          fi

          # Fetch the follow-up markers already filed for this repo once. Dedup is
          # per-finding (content-hashed), so a partial-failure re-run re-files only
          # the missing findings, not the whole batch — nothing is silently lost.
          # Label-filtered list → no search-index lag.
          existing=$(gh issue list --repo "$REPO" --label ai-review-followup --state all --limit 200 \
            --json body --jq '.[].body' 2>/dev/null || true)

          gh label create ai-review-followup --repo "$REPO" --color FBCA04 \
            --description "Non-blocking finding surfaced by the AI merge gate" 2>/dev/null || true

          for f in "${items[@]}"; do
            loc=$(jq -r '.location // "?"' <<<"$f")
            note=$(jq -r '.note // ""' <<<"$f")
            [ -z "$note" ] && continue
            key=$(printf '%s|%s' "$loc" "$note" | sha1sum | cut -c1-12)
            marker="<!-- ai-review-followup:pr$PR_NUMBER:$key -->"
            if printf '%s' "$existing" | grep -qF "$marker"; then
              echo "Follow-up already filed for $loc"
              continue
            fi
            short=$(printf '%s' "$note" | tr '\n' ' ' | cut -c1-70)
            body=$(printf '%s\n\nNon-blocking finding from the merge-gate review of #%s (approved and merged).\n\n**Location:** `%s`\n\n%s' \
              "$marker" "$PR_NUMBER" "$loc" "$note")
            if gh issue create --repo "$REPO" --title "AI-review follow-up: $short" \
                 --body "$body" --label ai-review-followup >/dev/null 2>&1; then
              echo "Filed follow-up for $loc"
            else
              echo "::warning::Could not file follow-up for $loc"
            fi
          done
