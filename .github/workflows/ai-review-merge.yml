name: AI review + auto-merge

# ORG-LEVEL autonomous merge gate (viager-docs ADR-018, as amended), required
# on every repo via the main-protection org ruleset.
#
# Cost-lane design (ADR-018 second amendment):
#   1. `classify` (free, deterministic bash) routes each PR into a lane:
#        - fast: submodule pointer bumps (every new gitlink SHA verified to be
#          on the submodule's default branch), Renovate non-major updates
#          (bot-authored, manifest/lockfile-only diff, `update/<type>` label),
#          and deletions-only PRs. No model is invoked.
#        - ai: everything else gets a Claude review — but only AFTER the rest
#          of CI is green, so red PRs cost $0.
#   2. Model tiering: routine code PRs are reviewed by Haiku; PRs touching
#      sensitive paths (authz/ABAC, payments/ledger, webhooks, secrets,
#      workflows) get the stronger default model. Turns are capped.
#   3. Reviews run on every ready-PR revision (incl. synchronize) so a
#      Renovate rebase re-fires the gate and the required check stays fresh on
#      the new head; cost stays bounded because fast-lane synchronizes invoke
#      no model and the AI lane only runs after CI is green. Re-run manually by
#      adding the `re-review` label (auto-removed) or via workflow_dispatch.
#
# Either lane merges only on green CI, squash + branch delete, using the
# org-admin ruleset bypass (same mechanism as the catalog auto-bump). Humans
# opt a PR out with the `hold` label, a "DO NOT MERGE" title marker, or by
# keeping it a draft — re-checked at merge time.

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize, labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to review and (on pass) merge
        required: true
      repository:
        description: owner/repo the PR lives in (defaults to this repo)
        required: false

concurrency:
  group: ai-review-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
  TARGET_REPO: ${{ inputs.repository || github.repository }}

jobs:
  classify:
    # `labeled` only re-triggers for the explicit re-review request; other
    # label additions (including `hold`) must not start a run.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        (github.event.action != 'labeled' || github.event.label.name == 're-review') &&
        !github.event.pull_request.draft &&
        !contains(github.event.pull_request.labels.*.name, 'hold') &&
        !contains(github.event.pull_request.title, 'DO NOT MERGE')
      )
    runs-on: ${{ github.repository == 'Verjson/.github' && fromJSON('["self-hosted","meta"]') || fromJSON('["self-hosted","gce"]') }}
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    outputs:
      lane: ${{ steps.classify.outputs.lane }}
      reason: ${{ steps.classify.outputs.reason }}
      model: ${{ steps.classify.outputs.model }}
      budget_usd: ${{ steps.classify.outputs.budget_usd }}
      dependency_major: ${{ steps.classify.outputs.dependency_major }}
      head_sha: ${{ steps.classify.outputs.head_sha }}
    steps:
      - name: Classify PR into a lane
        id: classify
        env:
          # Org-admin token: classification must read sibling repos
          # (submodule verification) and, for cross-repo dispatch, the target.
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          REPO="$TARGET_REPO"
          out() { echo "$1=$2" >> "$GITHUB_OUTPUT"; }

          meta=$(gh pr view "$PR_NUMBER" --repo "$REPO" \
            --json labels,title,isDraft,author,headRefOid,baseRefName)
          # Re-check opt-outs here too: workflow_dispatch bypasses the job if.
          if jq -e '(.labels | map(.name) | index("hold")) or (.title | contains("DO NOT MERGE")) or .isDraft' <<<"$meta" >/dev/null; then
            echo "PR is held (label/title/draft); no lane."
            out lane held; out reason "held by human opt-out"; out model none
            exit 0
          fi
          out head_sha "$(jq -r .headRefOid <<<"$meta")"
          out dependency_major false

          # Consume the re-review label so it can be re-applied later.
          gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label re-review 2>/dev/null || true

          files=$(gh api "repos/$REPO/pulls/$PR_NUMBER/files" --paginate --jq '.[]' | jq -s .)
          nfiles=$(jq length <<<"$files")
          if [ "$nfiles" -eq 0 ]; then
            out lane ai; out reason "empty diff — needs a look"; out model claude-haiku-4-5
            out budget_usd 0.15
            exit 0
          fi

          # Model tier for the AI lane: sensitive paths get the strong model.
          if jq -e '[.[].filename] | any(test("(^|/)\\.github/|abac|(^|/|[._-])auth|polic|payment|ledger|webhook|secret|middleware|rbac|rls"; "i"))' <<<"$files" >/dev/null; then
            model=claude-sonnet-5
            # Workflow/security reviews get the strong model and more budget. If
            # even this exhausts, the review escalates (see the ai-review job)
            # instead of failing, so the cap is a floor to escalate from, not a
            # hard wall. The 15-turn cap bounds exploration.
            budget_usd=0.50
          else
            model=claude-haiku-4-5
            budget_usd=0.15
          fi
          out model "$model"
          out budget_usd "$budget_usd"

          # ---- Fast lane A: submodule pointer bump -------------------------
          # Every changed file is a gitlink hunk, and each new SHA is already
          # on the submodule's default branch (identical or behind = ancestor).
          if jq -e 'all(.[]; (.patch // "") | test("^@@[^\\n]*\\n(-Subproject commit [0-9a-f]{40}\\n?|\\+Subproject commit [0-9a-f]{40}\\n?)+$"))' <<<"$files" >/dev/null; then
            base=$(jq -r .baseRefName <<<"$meta")
            gm=$(mktemp)
            gh api "repos/$REPO/contents/.gitmodules?ref=$base" --jq .content | base64 -d > "$gm"
            ok=true
            while IFS=$'\t' read -r path sha; do
              name=$(git config -f "$gm" --list | awk -F= -v p="$path" '$2==p && $1 ~ /\.path$/ {sub(/^submodule\./,"",$1); sub(/\.path$/,"",$1); print $1; exit}')
              url=$(git config -f "$gm" --get "submodule.$name.url" || true)
              sub=$(sed -E 's#^(git@github\.com:|https://github\.com/)##; s#\.git$##; s#/*$##' <<<"$url")
              if [ -z "$sub" ]; then ok=false; echo "no submodule mapping for $path"; break; fi
              def=$(gh api "repos/$sub" --jq .default_branch)
              status=$(gh api "repos/$sub/compare/$def...$sha" --jq .status 2>/dev/null || echo unknown)
              echo "gitlink $path -> $sub@$sha vs $def: $status"
              case "$status" in identical|behind) ;; *) ok=false; break ;; esac
            done < <(jq -r '.[] | [.filename, ((.patch // "") | capture("\\+Subproject commit (?<s>[0-9a-f]{40})").s)] | @tsv' <<<"$files")
            if $ok; then
              out lane fast
              out reason "submodule pointer bump: every new gitlink SHA verified on its submodule's default branch"
              exit 0
            fi
          fi

          # ---- Fast lane B: Renovate non-major dependency update ----------
          author=$(jq -r .author.login <<<"$meta")
          if [[ "$author" =~ ^(app/)?renovate(\[bot\])?$ ]]; then
            commit_ok=$(gh api "repos/$REPO/pulls/$PR_NUMBER/commits" --paginate --jq '.[] | (.author.login // "MISSING")' \
              | jq -Rs 'split("\n") | map(select(length > 0)) | all(test("^renovate(\\[bot\\])?$"))')
            nonmajor=$(jq '.labels | map(.name) | any(test("^update/(patch|minor|pin|digest|pinDigest|lockFileMaintenance)$"))' <<<"$meta")
            # Keep the implementation aligned with the documented guarantee:
            # bot identity and labels alone are not enough for the fast lane.
            files_ok=$(jq '[.[].filename] | all(test("(^|/)(package(-lock)?\\.json|pnpm-lock\\.yaml|yarn\\.lock|bun\\.lockb?|Cargo\\.(toml|lock)|go\\.(mod|sum)|requirements[^/]*\\.txt|poetry\\.lock|pyproject\\.toml|Gemfile(\\.lock)?|composer\\.(json|lock)|gradle\\.lockfile|pom\\.xml|Chart\\.yaml|Chart\\.lock|values[^/]*\\.ya?ml|Dockerfile|\\.github/dependabot\\.yml)$"))' <<<"$files")
            if [ "$commit_ok" = true ] && [ "$nonmajor" = true ] && [ "$files_ok" = true ]; then
              out lane fast
              out reason "Renovate non-major update: bot-authored commits only, update-type label $(jq -r '.labels|map(.name)|map(select(startswith("update/")))|join(",")' <<<"$meta")"
              exit 0
            fi
            major=$(jq '.labels | map(.name) | index("update/major") != null' <<<"$meta")
            [ "$major" = true ] && out dependency_major true
            echo "renovate PR but not fast-lane eligible: commits_ok=$commit_ok nonmajor=$nonmajor files_ok=$files_ok"
          fi

          # Documentation and community-health changes have no executable
          # behavior. CI remains mandatory, but a model review adds little.
          if jq -e '[.[].filename] | all(test("(^|/)(NEXT\\.md|docs/.*|README(\\.[^/]*)?|CHANGELOG(\\.[^/]*)?|CONTRIBUTING(\\.[^/]*)?|CODE_OF_CONDUCT(\\.[^/]*)?|SECURITY(\\.[^/]*)?|SUPPORT(\\.[^/]*)?|LICENSE(\\.[^/]*)?|\\.github/(ISSUE_TEMPLATE/.*|PULL_REQUEST_TEMPLATE\\.md|FUNDING\\.yml))$"; "i"))' <<<"$files" >/dev/null; then
            out lane fast
            out reason "documentation/community-health-only change ($nfiles file(s)); CI must still pass"
            exit 0
          fi

          # ---- Fast lane C: deletions-only ---------------------------------
          if jq -e 'all(.[]; .status == "removed")' <<<"$files" >/dev/null; then
            out lane fast
            out reason "deletions-only PR ($nfiles file(s) removed, no content added); CI must still pass"
            exit 0
          fi

          out lane ai
          out reason "code change — AI review required (model: $model)"

  ai-review:
    needs: classify
    if: needs.classify.outputs.lane == 'ai'
    runs-on: ${{ github.repository == 'Verjson/.github' && fromJSON('["self-hosted","meta"]') || fromJSON('["self-hosted","gate"]') }}
    timeout-minutes: 45
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      # CI-first: never pay for a model review of a PR that fails its own CI.
      - name: Wait for the rest of CI to be green
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            rollup=$(gh pr view "$PR_NUMBER" --repo "$TARGET_REPO" \
              --json statusCheckRollup \
              --jq '[.statusCheckRollup[]? | select((.name // .context) as $n | $n != "classify" and $n != "ai-review" and $n != "ai-merge" and $n != "review")]')
            # Rollup mixes CheckRuns (name/status/conclusion) with commit
            # StatusContexts like renovate/stability-days (context/state) —
            # treating a context's null .status as pending hangs the gate.
            failed=$(jq '[.[] | select(((.conclusion // "") | IN("FAILURE","CANCELLED","TIMED_OUT","ACTION_REQUIRED")) or ((.state // "") | IN("FAILURE","ERROR")))] | length' <<<"$rollup")
            pending=$(jq -r '[.[] | select(if .state then (.state | IN("PENDING","EXPECTED")) else .status != "COMPLETED" end) | "\(.name // .context)=\(.state // .status)"] | join(", ")' <<<"$rollup")
            if [ "$failed" -gt 0 ]; then
              echo "CI is red for PR #$PR_NUMBER — skipping the AI review (no spend on red PRs)."
              exit 1
            fi
            [ -z "$pending" ] && exit 0
            echo "waiting before reviewing on: $pending"
            sleep 30
          done
          echo "Timed out waiting for CI; not reviewing. Still pending: $pending"
          exit 1

      - name: Checkout PR head
        uses: actions/checkout@v7
        with:
          repository: ${{ env.TARGET_REPO }}
          ref: ${{ needs.classify.outputs.head_sha }}
          token: ${{ secrets.ORG_ADMIN_TOKEN }}
          fetch-depth: 2

      - name: Prepare bounded review context
        id: prep
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
          DEPENDENCY_MAJOR: ${{ needs.classify.outputs.dependency_major }}
        run: |
          set -euo pipefail
          mkdir -p .ai-review
          gh pr view "$PR_NUMBER" --repo "$TARGET_REPO" \
            --json title,body,author,labels,baseRefName,headRefName,additions,deletions,changedFiles \
            > .ai-review/pr.json
          gh pr diff "$PR_NUMBER" --repo "$TARGET_REPO" > .ai-review/pr.diff

          # Debounce synchronize bursts. Concurrency cancels an older run, and
          # this SHA check ensures a superseded revision never reaches Claude.
          sleep 30
          current=$(gh pr view "$PR_NUMBER" --repo "$TARGET_REPO" --json headRefOid --jq .headRefOid)
          [ "$current" = "${{ needs.classify.outputs.head_sha }}" ] || {
            echo "PR head moved to $current during debounce; a newer run will review it."
            exit 1
          }

          # Compose the review prompt once. Both the first pass and, if it runs
          # out of budget/turns, the escalation pass reuse it verbatim so the
          # two reviews never drift. The economy instruction (read the diff,
          # then only the files a finding depends on) keeps the agentic loop
          # from wandering the tree and burning tokens on context resends.
          major_note=""
          if [ "$DEPENDENCY_MAJOR" = "true" ]; then
            major_note="This is a major dependency update. Also inspect the changed dependency version and repository evidence for breaking changes, deprecations, migrations, and security-relevant fixes."
          fi
          {
            echo "review_prompt<<PROMPT_EOF"
            cat <<EOF
          You are the autonomous merge gate for ${TARGET_REPO}.
          Review PR #${PR_NUMBER} in ${TARGET_REPO}.
          Metadata is in .ai-review/pr.json and the complete diff is in
          .ai-review/pr.diff. Read those two files first, then open only the
          specific repository files a potential finding actually depends on —
          be economical and do not broadly explore the tree.

          Review for, in priority order:
          1. Correctness bugs and behavioral regressions.
          2. Security: authn/authz changes, tenant isolation, secret
             handling, input validation at boundaries, injection.
          3. Money-handling invariants (integer minor units, double-entry
             balance, idempotency, provider-confirmed amounts only).
          4. Missing or weakened tests for changed behavior.
          Style-only nits are not blocking; mention at most briefly.

          ${major_note}

          Return the required JSON verdict as soon as you can support it. Do
          not call GitHub or submit a review yourself. Set blocking=true only
          for real defects. Each blocking finding must include file:line, why
          it is wrong, and a concrete failure scenario. Keep summary concise.

          Be skeptical but calibrated: block on real defects, not
          hypotheticals. A docs-only PR with sane content should simply be
          approved.
          EOF
            echo "PROMPT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Claude review (merge gate)
        id: claude
        # Do not fail the job on budget/turn exhaustion — the next step
        # inspects the (empty) verdict and escalates instead of dying here.
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.ORG_ADMIN_TOKEN }}
          # Renovate opens PRs as a bot actor; without this the action
          # refuses to run (majors and non-standard bot PRs reach this lane).
          allowed_bots: "renovate,renovate[bot],mend[bot]"
          prompt: ${{ steps.prep.outputs.review_prompt }}
          claude_args: |
            --model ${{ needs.classify.outputs.model }}
            --max-turns 15
            --max-budget-usd ${{ needs.classify.outputs.budget_usd }}
            --json-schema '{"type":"object","properties":{"blocking":{"type":"boolean"},"summary":{"type":"string"},"findings":{"type":"array","items":{"type":"string"}}},"required":["blocking","summary","findings"],"additionalProperties":false}'
            --allowedTools "Read,Grep,Glob"

      # Budget/turn exhaustion returns an empty structured_output (subtype
      # error_max_budget_usd / error_max_turns) — a signal the PR is bigger than
      # the cheap tier, NOT a review failure. Escalate to the strongest model
      # with a larger budget. A fresh pass (not --resume): the first session's
      # state may not survive into a second action invocation, and a resume that
      # errored would strand the very PR we are trying to unblock. Runs only when
      # the first pass produced no verdict, so the common case never reaches here.
      - name: Escalate review when the first pass ran out of budget or turns
        id: claude_retry
        if: steps.claude.outputs.structured_output == ''
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.ORG_ADMIN_TOKEN }}
          allowed_bots: "renovate,renovate[bot],mend[bot]"
          prompt: ${{ steps.prep.outputs.review_prompt }}
          claude_args: |
            --model claude-sonnet-5
            --max-turns 30
            --max-budget-usd 1.00
            --json-schema '{"type":"object","properties":{"blocking":{"type":"boolean"},"summary":{"type":"string"},"findings":{"type":"array","items":{"type":"string"}}},"required":["blocking","summary","findings"],"additionalProperties":false}'
            --allowedTools "Read,Grep,Glob"

      - name: Submit deterministic PR review
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
          # Prefer the escalation verdict; fall back to the first pass.
          VERDICT: ${{ steps.claude_retry.outputs.structured_output != '' && steps.claude_retry.outputs.structured_output || steps.claude.outputs.structured_output }}
        run: |
          set -euo pipefail
          # Neither pass produced a verdict (budget/turn exhaustion or a hard
          # error on both attempts). Fail closed — never merge unreviewed — but
          # leave an explained, actionable record and flag for a human instead
          # of dying on the action's cryptic "did not return structured_output".
          if ! jq -e '.blocking | type == "boolean"' <<<"$VERDICT" >/dev/null 2>&1; then
            gh pr edit "$PR_NUMBER" --repo "$TARGET_REPO" --add-label ai-review-inconclusive 2>/dev/null || true
            gh pr comment "$PR_NUMBER" --repo "$TARGET_REPO" --body "⚠️ **Merge gate: review could not complete**

          The automated review exhausted its budget/turns on both the first pass and the escalation pass, so no verdict was produced. This PR was **not** auto-merged. A maintainer should review and merge it manually."
            exit 1
          fi
          body=$(jq -r '.summary + (if (.findings | length) > 0 then "\n\n" + (.findings | map("- " + .) | join("\n")) else "" end)' <<<"$VERDICT")
          body="$body

          <!-- ai-review-head:${{ needs.classify.outputs.head_sha }} model:${{ needs.classify.outputs.model }} -->"
          if [ "$(jq -r .blocking <<<"$VERDICT")" = true ]; then
            # A token may be the PR author's identity. GitHub forbids a user
            # reviewing their own PR, but the non-zero result must still block
            # the admin merge and leave an auditable record.
            gh pr review "$PR_NUMBER" --repo "$TARGET_REPO" --request-changes --body "$body" \
              || gh pr comment "$PR_NUMBER" --repo "$TARGET_REPO" --body "🚫 **Merge gate: blocking verdict**

            $body"
            exit 1
          fi
          if ! approval_error=$(gh pr review "$PR_NUMBER" --repo "$TARGET_REPO" --approve --body "$body" 2>&1); then
            if [[ "$approval_error" != *"Can not approve your own pull request"* ]]; then
              echo "$approval_error" >&2
              exit 1
            fi
            # The required check and ai-merge job remain the enforcement
            # mechanism. A comment is the only GitHub-permitted audit record
            # when GitHub rejects the configured token's self-approval.
            gh pr comment "$PR_NUMBER" --repo "$TARGET_REPO" --body "✅ **Merge gate: approved verdict**

            $body"
          fi

      # --- CI telemetry (best-effort). Every step is `continue-on-error` so it
      # can NEVER fail or block the gate, and it stays dormant until
      # OTEL_EXPORTER_OTLP_ENDPOINT is set — the composite action no-ops without
      # an endpoint. Emits one CiTelemetryPayload for the review. See ADR 0004
      # and docs/ci-telemetry.md.
      - name: Fetch telemetry helper scripts
        if: always()
        continue-on-error: true
        uses: actions/checkout@v5
        with:
          repository: Verjson/.github
          ref: main
          path: .gate-tools
          sparse-checkout: scripts/ci-telemetry
          sparse-checkout-cone-mode: false

      - name: Build ai-review telemetry payload
        if: always()
        continue-on-error: true
        env:
          VERDICT_JSON: ${{ steps.claude_retry.outputs.structured_output != '' && steps.claude_retry.outputs.structured_output || steps.claude.outputs.structured_output }}
          EXECUTION_FILE: ${{ steps.claude_retry.outputs.execution_file != '' && steps.claude_retry.outputs.execution_file || steps.claude.outputs.execution_file }}
          ACTION_CONCLUSION: ${{ steps.claude_retry.conclusion != 'skipped' && steps.claude_retry.conclusion || steps.claude.conclusion }}
          LANE: ${{ needs.classify.outputs.lane }}
          LANE_REASON: ${{ needs.classify.outputs.reason }}
          MODEL: ${{ needs.classify.outputs.model }}
          BUDGET_USD: ${{ needs.classify.outputs.budget_usd }}
          DEPENDENCY_MAJOR: ${{ needs.classify.outputs.dependency_major }}
        run: |
          set -uo pipefail    # deliberately no -e: telemetry must never abort
          mkdir -p .telemetry
          exec_summary=$(.gate-tools/scripts/ci-telemetry/parse-claude-execution.sh "${EXECUTION_FILE:-}" 2>/dev/null || echo '{}')
          verdict_blocking=null
          findings_count=null
          if [ -n "${VERDICT_JSON:-}" ] && jq -e . >/dev/null 2>&1 <<<"$VERDICT_JSON"; then
            verdict_blocking=$(jq -c '.blocking // null' <<<"$VERDICT_JSON")
            findings_count=$(jq -c '(.findings // []) | length' <<<"$VERDICT_JSON")
          fi
          jq -n \
            --arg repository "$TARGET_REPO" \
            --arg workflow_name "$GITHUB_WORKFLOW" \
            --arg event_name "$GITHUB_EVENT_NAME" \
            --arg lane "${LANE:-}" \
            --arg lane_reason "${LANE_REASON:-}" \
            --arg model_selected "${MODEL:-}" \
            --arg action_conclusion "${ACTION_CONCLUSION:-}" \
            --argjson budget_usd "${BUDGET_USD:-0}" \
            --argjson dependency_major "${DEPENDENCY_MAJOR:-false}" \
            --argjson verdict_blocking "$verdict_blocking" \
            --argjson findings_count "$findings_count" \
            --argjson exec "$exec_summary" \
            '{
              schema_version: 1,
              verjson_project: "verjson",
              repository: $repository,
              workflow_name: $workflow_name,
              job_name: "ai-review",
              event_name: $event_name,
              lane: $lane,
              review_type: "ai",
              lane_reason: (if $lane_reason == "" then null else $lane_reason end),
              model_selected: (if $model_selected == "" then null else $model_selected end),
              budget_usd: $budget_usd,
              dependency_major: $dependency_major,
              verdict_blocking: $verdict_blocking,
              findings_count: $findings_count,
              action_conclusion: (if $action_conclusion == "" then null else $action_conclusion end),
              execution_file_present: ($exec.execution_file_present // false),
              execution_file_parse_ok: ($exec.execution_file_parse_ok // false),
              total_cost_usd: ($exec.total_cost_usd // null),
              total_turns: ($exec.num_turns // null)
            }' > .telemetry/ai-review.json

      - name: Emit ai-review telemetry
        if: always()
        continue-on-error: true
        uses: Verjson/verjson-observability@v0.7.2
        with:
          payload-file: .telemetry/ai-review.json
          exporter-url: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          headers: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}

  ai-merge:
    needs: [classify, ai-review]
    # Fast lane skips ai-review entirely; AI lane requires its success.
    if: >
      !cancelled() && needs.classify.result == 'success' &&
      (needs.classify.outputs.lane == 'fast' ||
       (needs.classify.outputs.lane == 'ai' && needs.ai-review.result == 'success'))
    runs-on: ${{ github.repository == 'Verjson/.github' && fromJSON('["self-hosted","meta"]') || fromJSON('["self-hosted","gate"]') }}
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      LANE: ${{ needs.classify.outputs.lane }}
      LANE_REASON: ${{ needs.classify.outputs.reason }}
    steps:
      - name: Wait for the rest of CI, then squash-merge
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          REPO="$TARGET_REPO"
          # Re-check the opt-outs at merge time: a `hold` label added after
          # classification must still stop the merge.
          meta=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json labels,title,isDraft,state)
          if jq -e '(.labels | map(.name) | index("hold")) or (.title | contains("DO NOT MERGE")) or .isDraft' <<<"$meta" >/dev/null; then
            echo "PR #$PR_NUMBER is held (label/title/draft); not merging."
            exit 0
          fi
          if [ "$(jq -r .state <<<"$meta")" != "OPEN" ]; then
            echo "PR #$PR_NUMBER is no longer open; nothing to do."
            exit 0
          fi
          # Poll every 30s for up to 40 min, excluding this workflow's own jobs.
          for i in $(seq 1 80); do
            rollup=$(gh pr view "$PR_NUMBER" --repo "$REPO" \
              --json statusCheckRollup \
              --jq '[.statusCheckRollup[]? | select((.name // .context) as $n | $n != "classify" and $n != "ai-review" and $n != "ai-merge" and $n != "review")]')
            # Rollup mixes CheckRuns (name/status/conclusion) with commit
            # StatusContexts like renovate/stability-days (context/state) —
            # treating a context's null .status as pending hangs the gate.
            failed=$(jq '[.[] | select(((.conclusion // "") | IN("FAILURE","CANCELLED","TIMED_OUT","ACTION_REQUIRED")) or ((.state // "") | IN("FAILURE","ERROR")))] | length' <<<"$rollup")
            pending=$(jq -r '[.[] | select(if .state then (.state | IN("PENDING","EXPECTED")) else .status != "COMPLETED" end) | "\(.name // .context)=\(.state // .status)"] | join(", ")' <<<"$rollup")
            if [ "$failed" -gt 0 ]; then
              echo "CI failed for PR #$PR_NUMBER; not merging."
              jq -r '.[] | select(((.conclusion // "") | IN("FAILURE","CANCELLED","TIMED_OUT","ACTION_REQUIRED")) or ((.state // "") | IN("FAILURE","ERROR"))) | (.name // .context)' <<<"$rollup"
              exit 1
            fi
            if [ -z "$pending" ]; then
              if [ "$LANE" = "fast" ]; then
                # Audit trail: the fast lane's written record replaces the AI review.
                gh pr comment "$PR_NUMBER" --repo "$REPO" --body "✅ **Merge gate: fast lane** (no AI review needed) — ${LANE_REASON}. All CI checks green; squash-merging." || true
              fi
              echo "All checks green; merging PR #$PR_NUMBER (lane: $LANE)."
              gh pr merge "$PR_NUMBER" --repo "$REPO" --squash --admin --delete-branch
              exit 0
            fi
            echo "waiting before merging on: $pending"
            sleep 30
          done
          echo "Timed out waiting for CI on PR #$PR_NUMBER. Still pending: $pending"
          exit 1
