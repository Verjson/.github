name: Renovate AI review (compatibility)

# Zero-cost compatibility shim. Major dependency guidance now lives in the
# mandatory ai-review-merge workflow, avoiding two LLM calls for one PR. Keep
# this workflow until it is removed from the organization ruleset; then delete
# the file in a later cleanup.

on:
  workflow_call: {}
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  review:
    runs-on: ${{ github.repository == 'Verjson/.github' && fromJSON('["self-hosted","meta"]') || fromJSON('["self-hosted","gate"]') }}
    timeout-minutes: 2
    steps:
      - name: Confirm consolidated review path
        run: echo "Dependency review is consolidated into ai-review-merge; no second model call."
