name: actions-ci

# Runs the shell tests for the composite actions in this repo. Keeps the
# persistent-runner credential logic (verjson-cli-cloud#59) regression-covered
# and makes the "Evidence" for those actions reproducible in CI rather than
# narrated. Pinned to the GCP self-hosted pool like the rest of the org.

on:
  pull_request:
    paths:
      - '.github/actions/**'
      - '.github/actionlint.yaml'
      - '.github/workflows/actionlint.yml'
      - '.github/workflows/actions-ci.yml'
      - '.github/workflows/ai-review-merge.yml'
      - '.github/workflows/pulumi-ci.yml'
      - '.github/workflows/tag-major.yml'
      - 'scripts/**'
      - 'docs/decisions/**'
      - 'NEXT/**'
  push:
    branches: [main]
    paths:
      - '.github/actions/**'
      - '.github/actionlint.yaml'
      - '.github/workflows/actionlint.yml'
      - '.github/workflows/actions-ci.yml'
      - '.github/workflows/ai-review-merge.yml'
      - '.github/workflows/pulumi-ci.yml'
      - '.github/workflows/tag-major.yml'
      - 'scripts/**'
      - 'docs/decisions/**'
      - 'NEXT/**'

permissions:
  contents: read

jobs:
  shell-tests:
    runs-on: [self-hosted, GCP]
    steps:
      - uses: actions/checkout@v7
      - name: actionlint — workflow and config changes trigger lint (#82)
        run: bash scripts/actionlint-trigger.test.sh
      - name: setup-verjson-node — configure-git idempotency + secret hygiene
        run: bash .github/actions/setup-verjson-node/configure-git.test.sh
      - name: merge gate — freshness fail-open/fail-closed behavior
        run: bash scripts/ci-gate/freshness.test.sh
      - name: merge gate — review-comment render (ADR-0007 pinpointing)
        run: bash scripts/ci-gate/review-comment.test.sh
      - name: merge gate — ai-review retry chain (ADR 0015, #64)
        run: bash scripts/ci-gate/ai-review-retry.test.sh
      - name: merge gate — classify docs-fast-lane allowlist (#66, #75)
        run: bash scripts/ci-gate/classify-fast-lane.test.sh
      - name: merge gate — follow-up issue filing (ADR 0009)
        run: bash scripts/ci-gate/followup-issues.test.sh
      - name: merge gate — hold predicate and re-fire guards (ADR 0012, #51, #88)
        run: bash scripts/ci-gate/hold.test.sh
      - name: pulumi-ci — comment-on-pr no-op on push guard (#47)
        run: bash scripts/ci-gate/pulumi-comment.test.sh
      - name: tag-major — annotated tag points directly at release commit (#73)
        run: bash scripts/tag-major.test.sh
      - name: ADR index is generated & current (not hand-edited)
        run: bash scripts/gen-adr-index.sh --check
      - name: ADR index generator — edge cases (#67, #78, #79)
        run: bash scripts/ci-gate/gen-adr-index.test.sh
      - name: NEXT changelog fragments render cleanly
        run: bash scripts/render-next.sh >/dev/null
      - name: NEXT renderer — edge cases (#67)
        run: bash scripts/ci-gate/render-next.test.sh
