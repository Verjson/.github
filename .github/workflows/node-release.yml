name: node-release (reusable)

# Reusable release for the verJSON Node libraries: checkout (full history),
# setup-node against the @verjson registry, npm ci / build / test, then
# semantic-release. Runner defined here once (defaults to the GCP self-hosted
# pool). Mirrors node-ci.yml so the two stay in step.
#
# Caller (each lib's .github/workflows/release.yml):
#
#   name: Release
#   on:
#     push:
#       branches: [main]
#   jobs:
#     release:
#       uses: Verjson/.github/.github/workflows/node-release.yml@main
#       secrets: inherit          # passes NODE_AUTH_TOKEN

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version for actions/setup-node
        required: false
        type: string
        default: '24'
      scope:
        description: npm scope for the GitHub Packages registry
        required: false
        type: string
        default: '@verjson'
      runner:
        description: JSON array of runner labels; defaults to the GCP self-hosted pool
        required: false
        type: string
        default: '["self-hosted", "GCP"]'
    secrets:
      NODE_AUTH_TOKEN:
        description: Token to read @verjson private packages from GitHub Packages
        required: false

jobs:
  release:
    runs-on: ${{ fromJSON(inputs.runner) }}
    permissions:
      contents: write
      packages: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: https://npm.pkg.github.com
          scope: ${{ inputs.scope }}
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
      - run: npm run build
      - run: npm test
      - run: npx --yes semantic-release@24
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
