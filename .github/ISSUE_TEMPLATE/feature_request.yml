name: 💡 Feature Request
description: Suggest an idea, improvement, or new capability.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? We'd love to hear it. The more context you give us about the problem you're trying to solve, the better.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem are you trying to solve? Why does it matter?
      placeholder: I'm always frustrated when...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe what you'd like to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've considered.
    validations:
      required: false
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: How big do you think this change is?
      options:
        - Small (a tweak or minor addition)
        - Medium (a notable new capability)
        - Large (a significant new area of work)
        - Not sure
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links, references, or any other context.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
